<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sachin ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e7,#ffeef5);
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
}

.cat{
    width:250px;
    max-width:80%;
    border-radius:15px;
}

.name{
    color:#ff1493;
    font-size:40px;
    margin-top:15px;
}

.question{
    color:#333;
    margin-top:10px;
    margin-bottom:20px;
}

button{
    border:none;
    border-radius:12px;
    padding:12px 25px;
    font-size:20px;
    cursor:pointer;
    margin:10px;
    transition:0.3s;
}

#yesBtn{
    background:#28a745;
    color:white;
}

#noBtn{
    background:#ff4444;
    color:white;
}

#result{
    display:none;
    font-size:32px;
    color:#ff1493;
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<img class="cat"
src="cat.jpg"
alt="Cute Cat">

<h1 class="name">❤️ Sachin ❤️</h1>

<h2 class="question">
Do You Love Me? 🥺❤️
</h2>

<button id="yesBtn">Yes ❤️</button>
<button id="noBtn">No 😢</button>

<div id="result">
🥰 Yayyyy Sachin! ❤️<br>
I Love You Too 💖
</div>

</div>

<script>

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const result = document.getElementById("result");

let size = 20;

noBtn.addEventListener("click", () => {

    let x = Math.random() * (window.innerWidth - 120);
    let y = Math.random() * (window.innerHeight - 80);

    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    size += 8;

    yesBtn.style.fontSize = size + "px";
    yesBtn.style.padding =
        (size/2) + "px " + size + "px";
});

yesBtn.addEventListener("click", () => {

    document.querySelector(".cat").style.display="none";
    document.querySelector(".name").style.display="none";
    document.querySelector(".question").style.display="none";
    yesBtn.style.display="none";
    noBtn.style.display="none";

    result.style.display="block";
});

</script>

</body>
</html>
